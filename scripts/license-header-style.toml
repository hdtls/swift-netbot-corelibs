[SWIFT_STYLE]
firstLine = '// ===----------------------------------------------------------------------=== //'
endLine = "// ===----------------------------------------------------------------------=== //\n"
beforeEachLine = '// '
afterEachLine = ''
allowBlankLines = false
multipleLines = true
padLines = false
firstLineDetectionPattern = '//\s?==='
lastLineDetectionPattern = '//\s?==='
skipLinePattern = '// swift-tools-version'

[SHELL_STYLE]
firstLine = '## ===----------------------------------------------------------------------=== ##'
endLine = "## ===----------------------------------------------------------------------=== ##\n"
beforeEachLine = '## '
afterEachLine = ''
allowBlankLines = false
multipleLines = true
padLines = false
firstLineDetectionPattern = '##\s?==='
lastLineDetectionPattern = '##\s?==='
skipLinePattern = '#!/bin/bash'
