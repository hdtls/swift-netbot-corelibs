additionalHeaders = ["scripts/license-header-style.toml"]

headerPath = "scripts/license-header.txt"

includes = [
    "*.swift",
    "*.h",
    "*.cpp",
    "*.c",
    "*.sh",
]

excludes = ["CNELwIP"]

[git]
attrs = 'enable'
ignore = 'enable'

[properties]
copyrightOwner = "Junfeng Zhang and the Netbot project authors"

[mapping.SWIFT_STYLE]
extensions = ["swift", "c", "cpp", "h"]

[mapping.SHELL_STYLE]
extensions = ["sh"]
