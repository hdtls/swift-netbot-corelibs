name: Pull Request Validation (CI)

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  soundness:
    name: Soundness
    uses: swiftlang/github-workflows/.github/workflows/soundness.yml@main
    with:
      api_breakage_check_enabled: false
      format_check_enabled: false,
      docs_check_enabled: false,
      unacceptable_language_check_enabled: false
      license_header_check_project_name: "Netbot"
      linux_pre_build_command: git config --local url."https://${{ github.token }}@github".insteadOf https://github

  unit-tests:
    name: Unit tests
    uses: swiftlang/github-workflows/.github/workflows/swift_package_test.yml@main
    with:
      enable_windows_checks: false
      swift_flags: "--explicit-target-dependency-import-check error -Xswiftc -require-explicit-sendable"
      swift_nightly_flags: "--explicit-target-dependency-import-check error -Xswiftc -require-explicit-sendable"
      linux_exclude_swift_versions: "[{\"swift_version\": \"5.8\"}, {\"swift_version\": \"5.9\"}, {\"swift_version\": \"5.10\"}]"
      linux_pre_build_command: git config --global url."https://${{ github.token }}@github".insteadOf https://github
      linux_build_command: swift build
